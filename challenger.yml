$schema: "https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json"

name: challenger-endpoint
endpoint_name:  fraud-detection-endpoint
model: azureml:fraud-detection-challenger@latest
environment: azureml:deploiment_env@latest
code_configuration:
  code: .
  scoring_script: src/score.py
  
environment_variables:
  threshold: 0.
data_collector:
  collections:
    model_inputs:
      enabled: true
    model_outputs:
      enabled: true 
instance_type: Standard_F2s_v2
instance_count: 1
