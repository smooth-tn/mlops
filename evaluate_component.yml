$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

name: evaluate_model
display_name: Evaluate Model
version: 19

code: ./src
command: python evaluate.py --processed_data ${{inputs.processed_data}}  --run_info_input ${{inputs.run_info_input}}

inputs:
  processed_data:
    type: uri_folder
    description: Processed data for evaluation
  run_info_input:
    type: uri_folder
    description: models to evaluate
environment: azureml:fraud-detection-env@latest